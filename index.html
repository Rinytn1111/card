<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
<style>
body {
  margin: 0;
  background: #f7f7f7;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
  overflow: hidden;
}
.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}
.title {
  margin-top: 60px;
  font-size: 13px;
  color: #3a3a3c;
}
.cards {
  display: flex;
  gap: 11px;
  margin-top: 19px;
}
.card {
  width: 136px;
  height: 136px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  background: #fff;
  box-shadow: 0 2px 1px rgba(0,0,0,0.08);
}
.full-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.plus {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #d1d1d6;
  font-size: 40px;
  font-weight: 500;
}
.file-input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.pill {
  margin-top: 42px;
  width: 240px;
  height: 47px;
  border-radius: 9999px;
  border: 1.5px solid #d1d1d6;
  color: #8e8e93;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.crop-modal {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: none;
  flex-direction: column;
}
.crop-container {
  flex: 1;
  width: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
#cropImage {
  max-width: 100%;
  display: block;
}
.crop-footer {
  height: 100px;
  background: #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 25px;
  color: #fff;
  font-size: 16px;
  padding-bottom: env(safe-area-inset-bottom);
}
.crop-btn {
  cursor: pointer;
  padding: 10px;
  -webkit-tap-highlight-color: transparent;
}
.cropper-bg {
  background-image: none !important;
  background-color: #000 !important;
}
.cropper-point, .cropper-line {
  background-color: #fff !important;
}
.cropper-point.point-se,
.cropper-point.point-sw,
.cropper-point.point-nw,
.cropper-point.point-ne {
  width: 12px !important;
  height: 12px !important;
  opacity: 1 !important;
}
.cropper-point.point-s,
.cropper-point.point-n,
.cropper-point.point-e,
.cropper-point.point-w {
  display: none !important;
}
</style>
</head>
<body>

<div class="page">
  <div class="title">선택해 주십시오.</div>
  <div class="cards">
    <div class="card">
      <img id="imgResult" class="full-img">
      <div class="plus" id="plusIcon">+</div>
      <input type="file" id="fileInput" class="file-input" accept="image/*">
    </div>
    <div class="card">
      <div class="plus">+</div>
    </div>
  </div>
  <div class="pill">뒤로</div>
</div>

<div id="cropModal" class="crop-modal">
  <div class="crop-container">
    <img id="cropImage">
  </div>
  <div class="crop-footer">
    <div class="crop-btn" id="cancelBtn">取消</div>
    <div class="crop-btn" id="cropBtn">完成</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
const fileInput = document.getElementById('fileInput');
const imgResult = document.getElementById('imgResult');
const plusIcon = document.getElementById('plusIcon');
const cropModal = document.getElementById('cropModal');
const cropImage = document.getElementById('cropImage');
const cancelBtn = document.getElementById('cancelBtn');
const cropBtn = document.getElementById('cropBtn');
let cropperInstance = null;

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    cropImage.src = ev.target.result;
    cropModal.style.display = 'flex';
    if (cropperInstance) cropperInstance.destroy();
    cropperInstance = new Cropper(cropImage, {
      aspectRatio: 1,
      viewMode: 1,
      guides: true,
      center: true,
      background: false,
      autoCropArea: 0.8,
      dragMode: 'move',
      cropBoxMovable: true,
      cropBoxResizable: true,
      toggleDragModeOnDblclick: false
    });
    fileInput.value = '';
  };
  reader.readAsDataURL(file);
});

cancelBtn.addEventListener('click', () => {
  cropModal.style.display = 'none';
  if (cropperInstance) {
    cropperInstance.destroy();
    cropperInstance = null;
  }
});

cropBtn.addEventListener('click', () => {
  if (!cropperInstance) return;
  const canvas = cropperInstance.getCroppedCanvas({
    width: 1024,
    height: 1024
  });
  imgResult.src = canvas.toDataURL('image/jpeg', 0.9);
  imgResult.style.display = 'block';
  plusIcon.style.display = 'none';
  cropModal.style.display = 'none';
  cropperInstance.destroy();
  cropperInstance = null;
});
</script>
</body>
</html>
