<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Image Crop Demo</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f7f7f7;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
  overflow: hidden; /* 防止裁剪时页面滚动 */
}

/* 原始 UI 结构保持不变 */
.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

.title {
  margin-top: 60px;
  font-size: 13px;
  color: #3a3a3c;
}

.cards {
  display: flex;
  gap: 11px;
  margin-top: 19px;
}

.card {
  width: 136px;
  height: 136px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  background: #fff;
  box-shadow: 0 2px 1px rgba(0,0,0,0.08);
}

.full-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.plus {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #d1d1d6;
  font-size: 40px;
  font-weight: 500;
}

.file-input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.pill {
  margin-top: 42px;
  width: 240px;
  height: 47px;
  border-radius: 9999px;
  border: 1.5px solid #d1d1d6;
  color: #8e8e93;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

/* =========================================
   新增：全屏裁剪界面 (模拟参考图 UI)
   ========================================= */
.crop-modal {
  position: fixed;
  inset: 0;
  background: #000; /* 全黑背景 */
  z-index: 9999; /* 确保在最上层 */
  display: none; /* 默认隐藏 */
  flex-direction: column;
}

/* 裁剪区域 */
.crop-container {
  flex: 1;
  width: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Cropper.js 需要对 img 进行操作 */
#cropImage {
  max-width: 100%;
  display: block;
}

/* 底部操作栏 (还原参考图布局) */
.crop-footer {
  height: 100px;
  background: #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 25px;
  color: #fff;
  font-size: 16px;
  padding-bottom: env(safe-area-inset-bottom); /* 适配全面屏底部 */
}

.crop-btn {
  cursor: pointer;
  padding: 10px;
  -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
}

/* 还原参考图中的特定样式 */
#cropBtn {
  font-weight: 500;
}

/* =========================================
   Cropper.js 样式定制 (使其更像参考图)
   ========================================= */
/* 隐藏默认的马赛克背景 */
.cropper-bg {
  background-image: none !important;
  background-color: #000 !important;
}

/* 定制裁剪框的四角线段 */
.cropper-point, .cropper-line {
  background-color: #fff !important;
}

/* 调整角点大小和位置，使其呈现 "L" 形 */
.cropper-point.point-se,
.cropper-point.point-sw,
.cropper-point.point-nw,
.cropper-point.point-ne {
  width: 20px !important;
  height: 20px !important;
  opacity: 1 !important;
}

/* 隐藏不必要的控制点 */
.cropper-point.point-s,
.cropper-point.point-n,
.cropper-point.point-e,
.cropper-point.point-w {
  display: none !important;
}
</style>
</head>

<body>

<div class="page" id="mainPage">
  <div class="title">선택해 주십시오.</div>

  <div class="cards">
    <div class="card">
      <img id="imgResult" class="full-img">
      <div class="plus" id="plusIcon">+</div>
      <input type="file" class="file-input" id="fileInput" accept="image/*">
    </div>

    <div class="card">
      <div class="plus">+</div>
    </div>
  </div>

  <div class="pill">뒤로</div>
</div>

<div id="cropModal" class="crop-modal">
  <div class="crop-container">
    <img id="cropImage" src="">
  </div>
  <div class="crop-footer">
    <div class="crop-btn" id="cancelBtn">取消</div>
    <div class="crop-btn" id="cropBtn">完成</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
// 获取 DOM 元素
const fileInput = document.getElementById('fileInput');
const imgResult = document.getElementById('imgResult');
const plusIcon = document.getElementById('plusIcon');
const cropModal = document.getElementById('cropModal');
const cropImage = document.getElementById('cropImage');
const cancelBtn = document.getElementById('cancelBtn');
const cropBtn = document.getElementById('cropBtn');

let cropperInstance = null; // 用于存储 Cropper 实例

// 监听文件选择
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    // 1. 将读取到的图片显示在裁剪界面的图片槽中
    cropImage.src = ev.target.result;
    
    // 2. 显示全屏裁剪遮罩层
    cropModal.style.display = 'flex';
    
    // 3. 销毁旧实例（如果存在），初始化新的 Cropper 实例
    if (cropperInstance) {
      cropperInstance.destroy();
    }
    
    cropperInstance = new Cropper(cropImage, {
      aspectRatio: 1,        // 核心：强制 1:1 比例
      viewMode: 1,           // 限制裁剪框不能超出图片范围
      guides: true,          // 显示九宫格参考线
      center: true,          // 显示中心指示器
      background: false,     // 隐藏默认马赛克背景
      autoCropArea: 0.8,     // 初始裁剪框大小
      scalable: true,        // 允许缩放图片
      zoomable: true,        // 允许通过触摸缩放图片
      movable: true,         // 允许拖拽图片
      cropBoxMovable: true,  // 允许拖拽裁剪框
      cropBoxResizable: true,// 允许调整裁剪框大小
      toggleDragModeOnDblclick: false // 禁用双击切换模式
    });
    
    // 清空 input 值，防止取消后再选择同一张图片不触发 change 事件
    fileInput.value = '';
  };
  reader.readAsDataURL(file);
});

// "取消" 按钮逻辑
cancelBtn.addEventListener('click', () => {
  cropModal.style.display = 'none'; // 隐藏裁剪界面
  if (cropperInstance) {
    cropperInstance.destroy(); // 销毁实例，释放内存
    cropperInstance = null;
  }
});

// "完成" 按钮逻辑
cropBtn.addEventListener('click', () => {
  if (!cropperInstance) return;
  
  // 1. 获取裁剪后的 Canvas 对象，并设定清晰度
  const canvas = cropperInstance.getCroppedCanvas({
    width: 640,  // 设定裁剪后图片的宽度
    height: 640  // 设定裁剪后图片的高度 (保持 1:1)
  });
  
  // 2. 将 Canvas 转换为 Base64 格式的图片数据
  const croppedImageData = canvas.toDataURL('image/jpeg', 0.9);
  
  // 3. 将结果赋值给原始 UI 中的 img 标签
  imgResult.src = croppedImageData;
  imgResult.style.display = 'block';
  plusIcon.style.display = 'none';
  
  // 4. 隐藏裁剪界面并清理
  cropModal.style.display = 'none';
  cropperInstance.destroy();
  cropperInstance = null;
});
</script>

</body>
</html>
