<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- Cropper.js（新增） -->
<link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.min.css">
<script src="https://unpkg.com/cropperjs/dist/cropper.min.js"></script>

<style>
body {
  margin: 0;
  background: #f7f7f7;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
}

.page {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.title {
  margin-top: 60px;
  font-size: 13px;
  color: #3a3a3c;
}

.cards {
  display: flex;
  gap: 11px;
  margin-top: 19px;
}

/* 卡片 */
.card {
  width: 136px;
  height: 136px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  background: #fff;
  box-shadow: 0 2px 1px rgba(0,0,0,0.08);
}

/* 图片 */
.full-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* +号 */
.plus {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #d1d1d6;
  font-size: 40px;
  font-weight: 500;
}

/* input */
.file-input {
  position: absolute;
  inset: 0;
  opacity: 0;
}

/* 胶囊 */
.pill {
  margin-top: 42px;
  width: 240px;
  height: 47px;
  border-radius: 9999px;
  border: 1.5px solid #d1d1d6;
  color: #8e8e93;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

/* 裁剪弹窗（新增） */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

.modal-box {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}

.modal img {
  max-width: 300px;
}

button {
  margin-top: 10px;
  padding: 6px 12px;
}
</style>
</head>

<body>

<div class="page">
  <div class="title">선택해 주십시오.</div>

  <div class="cards">

    <!-- 左卡片 -->
    <div class="card">
      <img id="img" class="full-img">
      <div class="plus" id="plus">+</div>
      <input type="file" class="file-input" id="file" accept="image/*">
    </div>

    <!-- 右卡片 -->
    <div class="card">
      <div class="plus">+</div>
    </div>

  </div>

  <div class="pill">뒤로</div>
</div>

<!-- 裁剪弹窗（新增） -->
<div class="modal" id="modal">
  <div class="modal-box">
    <img id="crop-img">
    <br>
    <button id="ok">确定</button>
  </div>
</div>

<script>
const file = document.getElementById('file');
const img = document.getElementById('img');
const plus = document.getElementById('plus');

const modal = document.getElementById('modal');
const cropImg = document.getElementById('crop-img');
const okBtn = document.getElementById('ok');

let cropper;

// 上传图片
file.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;

  const reader = new FileReader();
  reader.onload = ev => {
    cropImg.src = ev.target.result;
    modal.style.display = 'flex';

    if (cropper) {
      cropper.destroy();
      cropper = null;
    }

    cropper = new Cropper(cropImg, {
      aspectRatio: 1,   // ⭐ 1:1裁剪
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 1,
      responsive: true,
      background: false,
      guides: true
    });
  };

  reader.readAsDataURL(f);
});

// 确认裁剪
okBtn.addEventListener('click', () => {
  const canvas = cropper.getCroppedCanvas({
    width: 300,
    height: 300
  });

  img.src = canvas.toDataURL();
  img.style.display = 'block';
  plus.style.display = 'none';

  cropper.destroy();
  cropper = null;
  modal.style.display = 'none';
});
</script>

</body>
</html>
